name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v --cov=services --cov-report=xml -m "not e2e"
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      continue-on-error: true
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  test-ui:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd ui
        npm install
    
    - name: Run tests
      run: |
        cd ui
        npm test -- --coverage --watchAll=false
    
    - name: Build
      run: |
        cd ui
        npm run build

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Check code format
      run: |
        python -m black --check services/ tests/
        python -m isort --check-only services/ tests/
        python -m flake8 services/ tests/

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit
    
    - name: Run security checks
      run: |
        bandit -r services/ -ll -c .bandit
        pip-audit -r requirements.txt

  build:
    runs-on: ubuntu-latest
    needs: [test-python, test-ui, lint]
    if: success()

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker images
      run: |
        docker build -t cloud-native-auth:latest services/auth-service
        docker build -t cloud-native-optimization:latest services/optimization-service
        docker build -t cloud-native-resource-mgmt:latest services/resource-mgmt-service
        docker build -t cloud-native-monitoring:latest services/monitoring-service
        docker build -t cloud-native-api-gateway:latest services/api-gateway
        docker build -t cloud-native-ui:latest ui
