apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-mgmt-service
  namespace: cloud-native-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resource-mgmt-service
  template:
    metadata:
      labels:
        app: resource-mgmt-service
    spec:
      containers:
      - name: resource-mgmt-service
        image: cloud-native/resource-mgmt-service:latest
        ports:
        - containerPort: 8003
        env:
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: RABBITMQ_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: resource-mgmt-service
  namespace: cloud-native-platform
spec:
  selector:
    app: resource-mgmt-service
  ports:
  - port: 8003
    targetPort: 8003
  type: ClusterIP