apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cloud-native-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
    - job_name: 'api-gateway'
      static_configs:
      - targets: ['api-gateway:8000']
    - job_name: 'auth-service'
      static_configs:
      - targets: ['auth-service:8001']
    - job_name: 'optimization-service'
      static_configs:
      - targets: ['optimization-service:8002']
    - job_name: 'resource-mgmt-service'
      static_configs:
      - targets: ['resource-mgmt-service:8003']
    - job_name: 'monitoring-service'
      static_configs:
      - targets: ['monitoring-service:8004']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: cloud-native-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config-volume
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: cloud-native-platform
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
  type: ClusterIP