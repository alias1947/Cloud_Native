apiVersion: apps/v1
kind: Deployment
metadata:
  name: optimization-service
  namespace: cloud-native-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: optimization-service
  template:
    metadata:
      labels:
        app: optimization-service
    spec:
      containers:
      - name: optimization-service
        image: cloud-native/optimization-service:latest
        ports:
        - containerPort: 8002
        - containerPort: 50051
          name: grpc
        env:
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_URL
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: optimization-service
  namespace: cloud-native-platform
spec:
  selector:
    app: optimization-service
  ports:
  - port: 8002
    targetPort: 8002
    name: http
  - port: 50051
    targetPort: 50051
    name: grpc
  type: ClusterIP